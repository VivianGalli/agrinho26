    <h1>O que é bioenergia?</h1>
    <p>A bioenergia é, de forma simples, a energia obtida a partir da biomassa — ou seja, qualquer matéria orgânica de origem recente (vegetal ou animal) que possa ser transformada em força motriz, calor, eletricidade ou combustíveis.

Ao contrário dos combustíveis fósseis (como o petróleo e o carvão, que levam milhões de anos para se formar), a bioenergia utiliza recursos que se renovam em um curto espaço de tempo.</p>
    <h1>Qual é a principal diferença entre os biocombustíveis de primeira geração (1G) e de segunda geração (2G)?</h1>
    <p>Os de primeira geração (1G) usam partes comestíveis de culturas agrícolas (como o açúcar da cana ou o amido do milho).
Os de segunda geração (2G) utilizam resíduos não alimentares e materiais lignocelulósicos (como a palha, o bagaço da cana e restos de madeira), evitando a competição direta com a produção de alimentos.</p>
    <h1>Como é produzido o biodiesel?</h1>
    <p>O biodiesel é produzido através de um processo químico chamado transesterificação. Nele, óleos vegetais (como soja ou palma) ou gorduras animais reagem com um álcool (metanol ou etanol) na presença de um catalisador, resultando no combustível límpido.</p>
    <h1>Por que a bioenergia é considerada uma alternativa neutra em carbono?</h1>
    <p>Porque o CO₂ liberado durante a queima da biomassa é o mesmo que as plantas absorveram da atmosfera por fotossíntese enquanto estavam crescendo. Assim, o ciclo fecha-se sem adicionar carbono novo à atmosfera, ao contrário dos combustíveis fósseis.</p>
